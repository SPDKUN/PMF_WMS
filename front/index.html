<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>预制菜 WMS - 智能仓储管理系统</title>
    <style>
      #app-loading {
        position: fixed;
        top: 0; left: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #f4f7f9;
      }
      html[data-theme="dark"] #app-loading {
        background-color: #1a1e1d;
      }
      #app-loading.hidden {
        pointer-events: none;
        visibility: hidden;
        opacity: 0;
        transition: all 0.6s ease-out;
      }
      #app-loading .title {
        margin-top: 66px;
        font-size: 24px;
        font-weight: 600;
        color: rgb(0 0 0 / 85%);
      }
      html[data-theme="dark"] #app-loading .title {
        color: rgb(255 255 255 / 85%);
      }
      .loader {
        position: relative;
        width: 48px;
        height: 48px;
      }
      .loader::before {
        position: absolute;
        top: 60px;
        left: 0;
        width: 48px;
        height: 5px;
        content: '';
        background: hsl(210 100% 50% / 50%);
        border-radius: 50%;
        animation: shadow-ani 0.5s linear infinite;
      }
      .loader::after {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        content: '';
        background: #10b981;
        border-radius: 4px;
        animation: jump-ani 0.5s linear infinite;
      }
      @keyframes jump-ani {
        15%  { border-bottom-right-radius: 3px; }
        25%  { transform: translateY(9px) rotate(22.5deg); }
        50%  { border-bottom-right-radius: 40px; transform: translateY(18px) scale(1, 0.9) rotate(45deg); }
        75%  { transform: translateY(9px) rotate(67.5deg); }
        100% { transform: translateY(0) rotate(90deg); }
      }
      @keyframes shadow-ani {
        0%, 100% { transform: scale(1, 1); }
        50%      { transform: scale(1.2, 1); }
      }
    </style>
    <script>
      (function() {
        var theme = localStorage.getItem('app-theme');
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app-loading">
      <div class="loader"></div>
      <div class="title">预制菜 WMS</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
