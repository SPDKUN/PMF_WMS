# DeepSeek大模型配置（替换为自己的密钥）
deepseek:
  api-key: sk-ee37a7a7978a4dd3b27da8427c09ce35    # 替换为你刚才复制的sk开头密钥
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat  # 最新通用模型，支持R1推理能力
  temperature: 0.2  # 健康咨询需要严谨，数值越低回答越准确，建议0.1-0.3
  max-tokens: 2048  # 单次回答最大长度

#分页管理
pagehelper:
  helper-dialect: mysql  # 指定数据库方言
  reasonable: true      # 合理化分页：页码异常时自动修正
  support-methods-arguments: true

# 数据库的驱动
spring:
  datasource:
#    url: jdbc:mysql://10.106.12.76:3306/pmfsql?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    username: remote_user
#    password: "YourNewStrongPass123!"

    url: jdbc:mysql://127.0.0.1/pmf?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: "kk17725602305"

#    url: jdbc:mysql://127.0.0.1/pmf?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    username: root
#    password: "123456"

  data:
    redis:
      # Redis服务器地址
      host: localhost
      # Redis端口（默认6379）
      port: 6379
      # Redis密码（无密码则注释/留空）
      # 连接超时时间（毫秒）
      timeout: 10000ms
      # 数据库索引（Redis默认16个库，默认使用0库）
      database: 0
      # 连接池配置（提升性能）
      lettuce:
        pool:
          # 最大活跃连接数
          max-active: 8
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数
          min-idle: 3
          # 最大等待时间（毫秒，-1表示无限制）
          max-wait: -1ms
  servlet:
    multipart:
      max-file-size: 10MB        # 单个文件最大10MB
      max-request-size: 20MB     # 单次请求最大50MB
  # 文件上传核心配置
file:
  upload:
    root-path: F:/2026summer/project/upload/file/   # 企业级存储路径（非项目根目录，避免部署丢失）
    temp-root-path: F:/2026summer/project/upload/temp/
    allow-types: jpg,png,jpeg,gif,pdf # 仅允许图片类型（头像）
    # 双层随机路径长度
    first-level-length: 2
    second-level-length: 3
    max-size: 10485760 # 10MB

mybatis:
  mapper-locations: classpath:com/neuedu/pmf/mapper/*.xml
  type-aliases-package: com.neuedu.pmf.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    com.neuedu.PMF.mapper: debug
    org.apache.ibatis: debug
    org.mybatis: debug
    java.sql: debug
server:
  port: 8088